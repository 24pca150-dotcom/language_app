<div class="container">
  <!-- Feedback Messages -->
  <div *ngIf="feedbackMessage() as msg" [class]="'feedback ' + msg.type">
    <span>{{ msg.text }}</span>
  </div>

  <!-- List View -->
  <div *ngIf="!isFormVisible()">
    <div class="action-bar">
      <button class="btn btn-primary" (click)="showCreateForm()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"
          style="display:inline-block; vertical-align:middle; margin-right: 8px;">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Create Package
      </button>
    </div>

    <!-- Table Container -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Code</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let pkg of packages()">
            <td><strong>{{ pkg.name }}</strong></td>
            <td><code>{{ pkg.code }}</code></td>
            <td>
              <span [class]="'badge ' + (pkg.is_active ? 'badge-success' : 'badge-error')">
                {{ pkg.is_active ? 'Active' : 'Inactive' }}
              </span>
            </td>
            <td>
              <div class="action-btns">
                <button class="btn-icon btn-edit" title="Edit" (click)="editPackage(pkg)">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                  </svg>
                </button>
                <button class="btn-icon btn-delete" title="Delete" (click)="deletePackage(pkg.id!)">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                  </svg>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="packages().length === 0">
            <td colspan="4" style="text-align: center; color: #94a3b8; padding: 2rem;">
              No packages found. Start by creating one!
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Form View -->
  <div class="card" *ngIf="isFormVisible()">
    <div class="card-header">
      <h3>{{ isEditMode() ? 'Edit Package' : 'Create New Package' }}</h3>
      <button class="btn-close" (click)="cancelForm()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <form [formGroup]="packageForm" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <mcv-input-field label="Package Name" formControlName="name" placeholder="Enter package name" [required]="true">
        </mcv-input-field>

        <mcv-input-field label="Package Code" formControlName="code" placeholder="Enter unique code" [required]="true">
        </mcv-input-field>

        <div class="full-width">
          <mcv-text-area label="Description" formControlName="description" [rows]="3"
            placeholder="Additional details...">
          </mcv-text-area>
        </div>

        <mcv-toggle-field label="Status" formControlName="is_active" onLabel="Active" offLabel="Inactive">
        </mcv-toggle-field>
      </div>

      <div class="button-group">
        <button type="submit" class="btn btn-primary">
          {{ isEditMode() ? 'Save Changes' : 'Submit' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="resetForm()">
          Reset
        </button>
        <button type="button" class="btn btn-outline" (click)="cancelForm()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
