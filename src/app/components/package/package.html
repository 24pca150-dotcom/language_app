<div class="container">
  <h2>Package System</h2>

  <!-- Feedback Messages -->
  <div *ngIf="feedbackMessage() as msg" 
       [class]="'feedback ' + msg.type">
    <span>{{ msg.text }}</span>
  </div>

  <!-- Form Card -->
  <div class="card">
    <h3>{{ isEditMode() ? 'Edit Package' : 'Create New Package' }}</h3>
    
    <form [formGroup]="packageForm" (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <mcv-input-field 
          label="Package Name" 
          formControlName="name" 
          placeholder="Enter package name"
          [required]="true">
        </mcv-input-field>

        <mcv-input-field 
          label="Package Code" 
          formControlName="code" 
          placeholder="Enter unique code"
          [required]="true">
        </mcv-input-field>

        <div class="full-width">
          <mcv-text-area 
            label="Description" 
            formControlName="description" 
            [rows]="3" 
            placeholder="Additional details...">
          </mcv-text-area>
        </div>

        <mcv-toggle-field 
          label="Status" 
          formControlName="is_active"
          onLabel="Active"
          offLabel="Inactive">
        </mcv-toggle-field>
      </div>

      <div class="button-group">
        <button type="submit" class="btn btn-primary">
          {{ isEditMode() ? 'Update Package' : 'Create Package' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="resetForm()">
          Reset Form
        </button>
      </div>
    </form>
  </div>

  <!-- Table Container -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Code</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let pkg of packages()">
          <td><strong>{{ pkg.name }}</strong></td>
          <td><code>{{ pkg.code }}</code></td>
          <td>
            <span [class]="'badge ' + (pkg.is_active ? 'badge-success' : 'badge-error')">
              {{ pkg.is_active ? 'Active' : 'Inactive' }}
            </span>
          </td>
          <td>
            <div class="action-btns">
              <button class="btn-icon btn-edit" title="Edit" (click)="editPackage(pkg)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
              </button>
              <button class="btn-icon btn-delete" title="Delete" (click)="deletePackage(pkg.id!)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="packages().length === 0">
          <td colspan="4" style="text-align: center; color: #94a3b8; padding: 2rem;">
            No packages found. Start by creating one above!
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
